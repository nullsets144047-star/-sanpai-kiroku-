// === 主祭神カード（Google Places APIから取得）===
const DeityCard = ({name, prefecture, lat, lng}) => {
  const [deity, setDeity] = useState(null);
  const [loading, setLoading] = useState(false);

  useEffect(()=>{
    if(!name) return;
    setLoading(true);
    // Google Places Text Search APIで神社情報を取得
    const query = encodeURIComponent((prefecture||'') + ' ' + name);
    const url = `https://maps.googleapis.com/maps/api/place/textsearch/json?query=${query}&language=ja&key=AIzaSyD-placeholder`;
    // NOTE: Google Places APIはCORSのためブラウザから直接叩けない
    // 代わりにWikipedia APIで主祭神を取得
    const wikiUrl = `https://ja.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(name)}`;
    fetch(wikiUrl)
      .then(r=>r.json())
      .then(d=>{
        if(d.extract){
          const keywords = ['主祭神','祭神','御祭神','御神体'];
          let found = null;
          for(const kw of keywords){
            const idx = d.extract.indexOf(kw);
            if(idx>=0){
              const after = d.extract.slice(idx+kw.length).replace(/^[はをにの：: ]/,'');
              const end = Math.min(after.indexOf('。')>0?after.indexOf('。'):999, after.indexOf('\n')>0?after.indexOf('\n'):999, 60);
              found = after.slice(0,end).trim();
              break;
            }
          }
          if(found) setDeity(found);
        }
        setLoading(false);
      })
      .catch(()=>{ setDeity(DEITIES[name]||null); setLoading(false); });
  },[name]);

  if(loading) return(
    <div style={{marginBottom:14,padding:"12px 16px",background:"linear-gradient(135deg,#FFF7ED,#FFFBFE)",borderRadius:14,border:"1.5px solid #FED7AA"}}>
      <div style={{fontSize:11,color:"#92400E",fontWeight:700,marginBottom:4,letterSpacing:1}}>⛩ 主祭神</div>
      <div style={{fontSize:12,color:"#B45309",opacity:.6}}>取得中...</div>
    </div>
  );
  if(!deity && !DEITIES[name]) return null;
  const displayDeity = deity || DEITIES[name];
  return(
    <div style={{marginBottom:14,padding:"12px 16px",background:"linear-gradient(135deg,#FFF7ED,#FFFBFE)",borderRadius:14,border:"1.5px solid #FED7AA"}}>
      <div style={{fontSize:11,color:"#92400E",fontWeight:700,marginBottom:4,letterSpacing:1}}>⛩ 主祭神</div>
      <div style={{fontSize:13,color:"#78350F",fontWeight:700,fontFamily:"'Zen Maru Gothic',sans-serif",lineHeight:1.6}}>{displayDeity}</div>
    </div>
  );
};

function getLuckyDay(date) {
  const d = date || new Date();
  const y=d.getFullYear(), m=d.getMonth()+1, day=d.getDate();
  const dow = d.getDay();
  const tags = [];
  // 六曜 (based on lunar month/day)
  // Simplified: use known 2026 data for accuracy
  const ds = `${y}-${String(m).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
  // 一粒万倍日 2026 dates
  const ichiryu2026 = ["2026-01-05","2026-01-06","2026-01-09","2026-01-18","2026-01-21","2026-01-30","2026-02-02","2026-02-05","2026-02-14","2026-02-17","2026-02-26","2026-03-01","2026-03-04","2026-03-05","2026-03-12","2026-03-17","2026-03-24","2026-03-29","2026-04-11","2026-04-14","2026-04-23","2026-04-26","2026-05-07","2026-05-08","2026-05-19","2026-05-20","2026-05-31","2026-06-01","2026-06-14","2026-06-15","2026-06-26","2026-06-27","2026-07-10","2026-07-11","2026-07-19","2026-07-22","2026-07-31","2026-08-03","2026-08-15","2026-08-16","2026-08-25","2026-08-28","2026-09-09","2026-09-12","2026-09-21","2026-09-24","2026-10-01","2026-10-06","2026-10-09","2026-10-18","2026-10-21","2026-10-30","2026-11-02","2026-11-15","2026-11-16","2026-11-27","2026-11-28","2026-12-12","2026-12-13","2026-12-16","2026-12-24","2026-12-25"];
  // 天赦日 2026
  const tensha2026 = ["2026-03-05","2026-05-20","2026-07-19","2026-08-03","2026-10-01","2026-12-16"];
  // 寅の日 (every 12 days from a known date: 2026-01-03 is 寅の日)
  const toraBase = new Date(2026,0,3);
  const diffDays = Math.floor((d - toraBase)/(86400000));
  const isTora = diffDays >= 0 && diffDays % 12 === 0;
  // 巳の日 (every 12 days from 2026-01-06)
  const miBase = new Date(2026,0,6);
  const diffMi = Math.floor((d - miBase)/(86400000));
  const isMi = diffMi >= 0 && diffMi % 12 === 0;
  // 大安 (simplified using known pattern for 2026)
  const taian2026mar = [5,11,17,22,28];
  // Use a broader calculation: 六曜 cycles from lunar calendar
  // For simplicity, use a lookup for current month
  const taianDates = {"2026-03":[5,11,17,22,28],"2026-04":[3,8,14,20,26],"2026-05":[2,7,13,19,25,31],"2026-06":[6,12,18,24,30],"2026-07":[5,11,17,23,29],"2026-08":[4,10,16,22,28],"2026-09":[3,9,15,21,27],"2026-10":[3,8,14,20,26],"2026-11":[1,7,13,19,25],"2026-12":[1,6,12,18,24,30],"2026-01":[4,10,15,21,27],"2026-02":[2,8,13,19,25]};
  const mk = `${y}-${String(m).padStart(2,"0")}`;
  const isTaian = taianDates[mk]?.includes(day);

  if (tensha2026.includes(ds)) tags.push({t:"天赦日",c:"#DC2626",bg:"#FEF2F2",desc:"最上の大吉日"});
  if (ichiryu2026.includes(ds)) tags.push({t:"一粒万倍日",c:"#D97706",bg:"#FFFBEB",desc:"始め事に最適"});
  if (isTora) tags.push({t:"寅の日",c:"#B45309",bg:"#FEF3C7",desc:"金運招来"});
  if (isMi) tags.push({t:"巳の日",c:"#059669",bg:"#D1FAE5",desc:"弁財天の縁日"});
  if (isTaian) tags.push({t:"大安",c:"#1D4ED8",bg:"#DBEAFE",desc:"万事に吉"});
  // 神吉日 (every 6 days from 2026-01-01 roughly)
  const kamiyoshiBase = new Date(2026,0,2);
  const diffK = Math.floor((d - kamiyoshiBase)/(86400000));
  if (diffK >= 0 && diffK % 6 === 0) tags.push({t:"神吉日",c:"#7C3AED",bg:"#EDE9FE",desc:"参拝に良い日"});

  return tags;
}

// === LIST ===
const List = ({data,onSel}) => {

  const ls = useMemo(()=>{let d=[...data];if(cat==="s")d=d.filter(x=>x.category==="神社");if(cat==="t")d=d.filter(x=>x.category!=="神社");if(q){const s=q.toLowerCase();d=d.filter(x=>x.name.toLowerCase().includes(s)||x.prefecture.includes(s));}if(so==="recent")d.sort((a,b)=>{const am=a.visits.length?Math.max(...a.visits.map(v=>+new Date(v.date))):0;const bm=b.visits.length?Math.max(...b.visits.map(v=>+new Date(v.date))):0;return bm-am;});else if(so==="count")d.sort((a,b)=>b.visits.length-a.visits.length);else d.sort((a,b)=>a.name.localeCompare(b.name,"ja"));return d;},[data,q,cat,so]);
  return(<div style={{padding:"0 0 16px"}}>

      <div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap"}}>

        <select value={so} onChange={e=>sO(e.target.value)} style={{marginLeft:"auto",padding:"7px 12px",borderRadius:14,border:"2px solid #F3E8F0",fontSize:12,color:"#8B5E83",background:"#FFFBFE",fontFamily:"'Zen Maru Gothic',sans-serif",fontWeight:600}}><option value="recent">新しい順</option><option value="count">参拝回数順</option><option value="name">名前順</option></select>

        return(
        <div key={it.id} onClick={()=>onSel(it)} style={{display:"flex",alignItems:"center",gap:14,padding:"14px 16px",marginBottom:10,background:"#FFFBFE",borderRadius:18,border:"1.5px solid #F3E8F0",cursor:"pointer",animation:`fsu .3s ease ${Math.min(i,12)*.04}s both`,transition:"transform .15s"}}>
          <div style={{width:48,height:48,borderRadius:16,background:it.category==="神社"?"linear-gradient(135deg,#FEF3C7,#FDE68A)":"linear-gradient(135deg,#EDE9FE,#DDD6FE)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>{it.category==="神社"?"⛩":"🛕"}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:3}}>
              <span style={{fontSize:12,color:"#9D6B8A",fontWeight:600,flexShrink:0}}>{it.prefecture}</span>
              <span style={{fontSize:15,fontWeight:800,color:"#4A1942",fontFamily:"'Zen Maru Gothic',sans-serif",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{it.name}</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{background:"linear-gradient(135deg,#FCE7F3,#FBCFE8)",padding:"2px 10px",borderRadius:10,fontSize:11,fontWeight:700,color:"#9D174D"}}>{it.visits.length}回参拝</span>{it.photos&&it.photos.length>0&&<span style={{fontSize:11,color:"#B388A8"}}>📷{it.photos.length}</span>}
              {lastVisit && <span style={{fontSize:12,color:"#9D6B8A",fontWeight:500}}>最終 {FD(lastVisit.date)}</span>}
            </div>
          </div>
          <div style={{fontSize:18,color:"#D4A0C0"}}>›</div>
        </div>);
      })}
      {ls.length===0&&<div style={{textAlign:"center",padding:40,color:"#C084B0",fontFamily:"'Zen Maru Gothic',sans-serif",fontWeight:700}}>{q?"見つかりません":"記録を追加しましょう"}</div>}
    </div>
  </div>);

// === ADD/EDIT ===
const Add = ({data,setData,ei,sEi,toast:st,goTab,onC}) => {
  const em={name:"",category:"神社",prefecture:"",address:"",lat:"",lng:"",memo:"",photos:[],visits:[{id:G(),date:TD(),note:""}]};
  const [f,sF]=useState(em);const [lo,sLo]=useState(false);const [ok,sOk]=useState(false);
  const [places,sPlaces]=useState([]);const [showPicker,sShowPicker]=useState(false);
  const [nQ,sNQ]=useState("");const [nF,sNF]=useState(false);
  const phRef=useRef(null);
  const addPhoto=useCallback((e)=>{
    const files=Array.from(e.target.files||[]);
    if(!files.length)return;
    files.forEach(file=>{
      if(!file.type.startsWith("image/")){st("画像ファイルを選択してください","error");return;}
      if(file.size>5*1024*1024){st("5MB以下の画像を選択してください","error");return;}
      const reader=new FileReader();
      reader.onload=(ev)=>{
        sF(prev=>({...prev,photos:[...prev.photos,{id:G(),data:ev.target.result,name:file.name}]}));
      };
      reader.readAsDataURL(file);
    });
    e.target.value="";
  },[st]);
  const rmPhoto=(id)=>sF(prev=>({...prev,photos:prev.photos.filter(p=>p.id!==id)}));
  const nSug=useMemo(()=>{if(!nQ||nQ.length<1)return[];const q=nQ.toLowerCase();return data.filter(d=>d.name.toLowerCase().includes(q)).slice(0,8);},[nQ,data]);
  useEffect(()=>{if(ei){sF({name:ei.name,category:ei.category,prefecture:ei.prefecture,address:ei.address,lat:ei.lat||"",lng:ei.lng||"",memo:ei.memo||"",photos:ei.photos||[],visits:ei.visits.map(v=>({...v}))});sOk(false);sPlaces([]);}else{sF(em);sOk(false);sPlaces([]);}},[ei]);
  const s=(k,v)=>sF(p=>({...p,[k]:v}));const aV=()=>sF(p=>({...p,visits:[...p.visits,{id:G(),date:TD(),note:""}]}));const rV=id=>sF(p=>({...p,visits:p.visits.filter(v=>v.id!==id)}));const uV=(id,k,v)=>sF(p=>({...p,visits:p.visits.map(x=>x.id===id?{...x,[k]:v}:x)}));

  // GPS + Overpass API で周辺の神社仏閣を検索
  const gL=useCallback(()=>{
    if(!navigator.geolocation){st("位置情報が利用できません","error");return;}
    sLo(true);sOk(false);sPlaces([]);sShowPicker(false);
    navigator.geolocation.getCurrentPosition(pos=>{
      const lat=pos.coords.latitude, lng=pos.coords.longitude;
      sF(prev=>({...prev,lat:lat.toFixed(6),lng:lng.toFixed(6)}));
      // Overpass APIで周辺1km以内の神社仏閣を検索
      const radius = 1500;
      const query = `[out:json][timeout:10];(node["amenity"="place_of_worship"](around:${radius},${lat},${lng});way["amenity"="place_of_worship"](around:${radius},${lat},${lng});node["religion"](around:${radius},${lat},${lng});node["historic"="shrine"](around:${radius},${lat},${lng});node["historic"="temple"](around:${radius},${lat},${lng}););out center 20;`;
      fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`)
        .then(r=>r.json())
        .then(d=>{
          const results = (d.elements||[])
            .filter(e=>e.tags&&e.tags.name)
            .map(e=>({
              name: e.tags.name,
              nameEn: e.tags["name:en"]||"",
              religion: e.tags.religion||"",
              lat: e.lat || (e.center&&e.center.lat),
              lng: e.lon || (e.center&&e.center.lon),
              addr: e.tags["addr:full"]||e.tags["addr:street"]||"",
              category: (e.tags.religion==="buddhism"||/寺|院|堂/.test(e.tags.name||""))?"寺院":"神社",
            }))
            .filter((e,i,a)=>a.findIndex(x=>x.name===e.name)===i)
            .slice(0,15);
          sLo(false);
          if(results.length>0){
            sPlaces(results);sShowPicker(true);
            st(`📍 周辺に${results.length}件見つかりました`,"success");
          } else {
            // Nominatimで逆ジオコード
            fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=ja&zoom=16`)
              .then(r=>r.json())
              .then(geo=>{
                sOk(true);
                if(geo.display_name){
                  const parts = geo.display_name.split(",").map(s=>s.trim());
                  sF(prev=>({...prev,address:prev.address||parts.slice(0,3).join(" ")}));
                }
                st("📍 位置情報を取得しました（周辺に神社仏閣が見つかりませんでした）","success");
              }).catch(()=>{sOk(true);st("📍 位置情報を取得しました","success");});
          }
        })
        .catch(()=>{
          sLo(false);sOk(true);
          st("📍 座標を取得（施設検索は利用できませんでした）","success");
        });
    },e=>{
      sLo(false);
      st(e.code===1?"位置情報の許可が必要です。ブラウザ設定を確認してください":e.code===2?"位置情報を取得できません":"タイムアウトしました","error");
    },{enableHighAccuracy:true,timeout:15000,maximumAge:0});
  },[st]);

  // 候補を選択してフォームに反映
  const pickPlace = (place) => {
    // 都道府県を推定（住所から、またはNominatimで取得）
    const lat = place.lat, lng = place.lng;
    sF(prev=>({
      ...prev,
      name: place.name,
      category: place.category,
      lat: lat ? String(lat) : prev.lat,
      lng: lng ? String(lng) : prev.lng,
      address: place.addr || prev.address,
    }));
    // Nominatimで都道府県・住所を取得
    if(lat && lng) {
      fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=ja&zoom=16`)
        .then(r=>r.json())
        .then(geo=>{
          const addr = geo.address || {};
          const pref = addr.province || addr.state || "";
          const fullAddr = geo.display_name ? geo.display_name.split(",").slice(0,4).join(" ").trim() : "";
          sF(prev=>({
            ...prev,
            prefecture: pref || prev.prefecture,
            address: prev.address || fullAddr,
          }));
        }).catch(()=>{});
    }
    sShowPicker(false);sOk(true);
    st(`✅ 「${place.name}」を選択しました`,"success");
  };

  const sv=()=>{if(!f.name.trim()){st("名称を入力","error");return;}if(!f.visits.length||!f.visits[0].date){st("参拝日を入力","error");return;}if(ei){setData(d=>d.map(x=>x.id===ei.id?{...x,...f}:x));st("更新しました ✏️","success");sEi(null);}else{setData(d=>[...d,{id:G(),...f,lat:f.lat?parseFloat(f.lat):null,lng:f.lng?parseFloat(f.lng):null,createdAt:TD()}]);onC();}sF(em);sOk(false);sPlaces([]);goTab(1);};
  const dl=()=>{if(ei&&window.confirm(`「${ei.name}」を削除？`)){setData(d=>d.filter(x=>x.id!==ei.id));sEi(null);sF(em);st("削除しました","success");goTab(1);}};
  return(<div style={{padding:"16px"}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}><h3 style={{margin:0,fontSize:18,fontWeight:800,color:"#4A1942",fontFamily:"'Zen Maru Gothic',sans-serif"}}>{ei?"✏️ 編集":"🙏 新しいお参り"}</h3>{ei&&<button onClick={()=>{sEi(null);sF(em);}} style={{padding:"6px 14px",borderRadius:12,border:"1.5px solid #E8D5E0",background:"#FFF5FA",fontSize:12,color:"#9D6B8A",cursor:"pointer",fontWeight:700,fontFamily:"'Zen Maru Gothic',sans-serif"}}>新規</button>}</div>

    {/* GPS Button */}
    <div onClick={lo?undefined:gL} style={{background:ok?"linear-gradient(135deg,#D1FAE5,#A7F3D0)":showPicker?"linear-gradient(135deg,#DBEAFE,#BFDBFE)":"linear-gradient(135deg,#EC4899,#F472B6)",borderRadius:20,padding:"18px 22px",marginBottom:showPicker?10:20,cursor:lo?"default":"pointer",display:"flex",alignItems:"center",gap:16,boxShadow:ok?"0 4px 20px rgba(5,150,105,.2)":"0 4px 20px rgba(236,72,153,.25)",opacity:lo?.8:1,position:"relative",overflow:"hidden"}}><div style={{width:48,height:48,borderRadius:16,background:ok?"rgba(5,150,105,.15)":showPicker?"rgba(30,64,175,.1)":"rgba(255,255,255,.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>{lo?<div style={{width:22,height:22,border:"3px solid rgba(255,255,255,.3)",borderTopColor:"#fff",borderRadius:"50%",animation:"sp .7s linear infinite"}}/>:ok?"✅":showPicker?"📋":"📍"}</div><div><div style={{fontSize:16,fontWeight:800,color:ok?"#065F46":showPicker?"#1E40AF":"#fff",fontFamily:"'Zen Maru Gothic',sans-serif"}}>{lo?"取得中...":ok?"選択済み！":showPicker?"下のリストから選んでください":"現在地でかんたん追加"}</div><div style={{fontSize:12,color:ok?"#059669":showPicker?"#3B82F6":"rgba(255,255,255,.85)",marginTop:2}}>{lo?"GPS確認中＋周辺検索中...":ok?"名称・座標・住所が入力されました":showPicker?`${places.length}件の候補が見つかりました`:"タップでGPS取得 → 周辺の神社仏閣を検索"}</div></div></div>

    {/* Place Picker */}
    {showPicker && places.length > 0 && (
      <div style={{marginBottom:20,background:"#FFFBFE",borderRadius:18,border:"1.5px solid #D1DEE8",overflow:"hidden",boxShadow:"0 4px 16px rgba(30,64,175,.08)"}}>
        <div style={{padding:"12px 16px 8px",borderBottom:"1px solid #E8F0FE",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span style={{fontSize:13,fontWeight:800,color:"#1E40AF",fontFamily:"'Zen Maru Gothic',sans-serif"}}>📍 周辺の神社仏閣</span>
          <button onClick={()=>{sShowPicker(false);sOk(true);}} style={{fontSize:11,color:"#9D6B8A",background:"#F9F0F5",border:"none",borderRadius:8,padding:"4px 10px",cursor:"pointer",fontWeight:600}}>手動入力</button>
        </div>
        <div style={{maxHeight:280,overflowY:"auto"}}>
          {places.map((p,i)=>(
            <div key={i} onClick={()=>pickPlace(p)} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",borderBottom:"1px solid #F3E8F0",cursor:"pointer",transition:"background .15s",background:i%2===0?"#FFFBFE":"#FFF5FA"}}
            onMouseEnter={e=>e.currentTarget.style.background="#EEF2FF"}
            onMouseLeave={e=>e.currentTarget.style.background=i%2===0?"#FFFBFE":"#FFF5FA"}>
              <div style={{width:40,height:40,borderRadius:12,background:p.category==="神社"?"linear-gradient(135deg,#FEF3C7,#FDE68A)":"linear-gradient(135deg,#EDE9FE,#DDD6FE)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{p.category==="神社"?"⛩":"🛕"}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:700,color:"#4A1942",fontFamily:"'Zen Maru Gothic',sans-serif"}}>{p.name}</div>
                <div style={{fontSize:11,color:"#B388A8"}}>{p.category}{p.addr?" ・"+p.addr:""}</div>
              </div>
              <div style={{fontSize:11,color:"#3B82F6",fontWeight:700,flexShrink:0}}>選択</div>
            </div>
          ))}
        </div>
      </div>
    )}

    <div style={{background:"#FFFBFE",borderRadius:22,padding:"22px",border:"1.5px solid #F3E8F0",boxShadow:"0 4px 20px rgba(150,80,130,.06)"}}>
      <Fl l="🏛 名称" r ch={<div style={{position:"relative"}}>
        <input type="text" value={f.name} onChange={e=>{s("name",e.target.value);sNQ(e.target.value);}} onFocus={()=>sNF(true)} onBlur={()=>setTimeout(()=>sNF(false),200)} placeholder="例：伊勢神宮（過去の記録から選択可）" style={inp}/>
        {nF && nQ.length>0 && nSug.length>0 && (
          <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:50,background:"#FFFBFE",borderRadius:"0 0 14px 14px",border:"2px solid #EC4899",borderTop:"none",maxHeight:200,overflowY:"auto",boxShadow:"0 8px 24px rgba(150,80,130,.15)"}}>
            {nSug.map((sg,i)=>(
              <div key={sg.id} onClick={()=>{sF(prev=>({...prev,name:sg.name,category:sg.category,prefecture:sg.prefecture,address:sg.address||"",lat:sg.lat||"",lng:sg.lng||"",memo:sg.memo||""}));sNF(false);sNQ("");st("✅ 「"+sg.name+"」の情報を反映しました","success");}} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",cursor:"pointer",borderBottom:i<nSug.length-1?"1px solid #F3E8F0":"none",transition:"background .1s"}}
                onMouseEnter={e=>e.currentTarget.style.background="#FCE7F3"}
                onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <span style={{fontSize:16}}>{sg.category==="神社"?"⛩":"🛕"}</span>

const Cfg = ({data,setData,toast:st}) => {
  const fr=useRef(null);
  const ex=()=>{const B="\uFEFF",h="ID,名称,種別,都道府県,住所,緯度,経度,参拝日,参拝回数,メモ,登録日時";const rs=data.map(d=>{const ds=d.visits.map(v=>v.date).join("；");const e=s=>`"${(s||"").replace(/"/g,'""')}"`;return[d.id,e(d.name),d.category,d.prefecture,e(d.address),d.lat||"",d.lng||"",e(ds),d.visits.length,e(d.memo),d.createdAt].join(",");});const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([B+h+"\n"+rs.join("\n")],{type:"text/csv;charset=utf-8;"}));a.download=`参拝記録_${TD()}.csv`;a.click();st("📄 エクスポート完了！","success");};

    <style>{`@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap');@keyframes fi{from{opacity:0}to{opacity:1}}@keyframes fsu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}@keyframes sp{from{transform:rotate(0)}to{transform:rotate(360deg)}}@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}@keyframes cf{0%{transform:translateY(0) translateX(0) rotate(0);opacity:1}100%{transform:translateY(-110vh) translateX(var(--dr)) rotate(360deg);opacity:0}}@keyframes cp{0%{opacity:0;transform:translate(-50%,-50%) scale(.3)}100%{opacity:1;transform:translate(-50%,-50%) scale(1)}}@keyframes pl{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}input:focus,textarea:focus,select:focus{border-color:#EC4899 !important;outline:none;box-shadow:0 0 0 3px rgba(236,72,153,.12) !important}::-webkit-scrollbar{width:0;height:0}body{margin:0;background:#FFF5FA}`}</style>
    
    <div style={{flex:1,overflowY:"auto",paddingBottom:85}}>
      <div key={tab} style={{animation:"fsu .25s ease both"}}>
        {tab===0&&<Home data={data} onSel={sDi}/>}
        {tab===1&&<List data={data} onSel={sDi}/>}
        {tab===2&&<Add data={data} setData={setData} ei={ei} sEi={sEi} toast={st} goTab={sTab} onC={()=>sC(true)}/>}
        {tab===3&&<Cfg data={data} setData={setData} toast={st}/>}
      </div>
    </div>
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"rgba(255,251,254,.96)",backdropFilter:"blur(20px)",borderTop:"1.5px solid #F3E8F0",display:"flex",justifyContent:"space-around",padding:"4px 0 env(safe-area-inset-bottom,10px)",zIndex:100}}>{tabs.map((x,i)=><button key={i} onClick={()=>sTab(i)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:1,padding:"6px 18px",border:"none",background:"transparent",cursor:"pointer",position:"relative"}}>{i===2?<div style={{width:50,height:50,borderRadius:18,background:"linear-gradient(135deg,#EC4899,#F472B6)",display:"flex",alignItems:"center",justifyContent:"center",marginTop:-22,fontSize:22,color:"#fff",boxShadow:"0 4px 16px rgba(236,72,153,.35)",animation:tab===2?"pl 2s ease infinite":"none"}}>{x.i}</div>:<span style={{fontSize:22,filter:tab===i?"none":"grayscale(.6) opacity(.5)"}}>{tab===i?x.a:x.i}</span>}<span style={{fontSize:10,fontWeight:tab===i?800:500,color:tab===i?"#BE185D":"#C084B0",fontFamily:"'Zen Maru Gothic',sans-serif"}}>{x.l}</span>{tab===i&&i!==2&&<div style={{position:"absolute",top:-2,width:24,height:3,borderRadius:2,background:"linear-gradient(90deg,#EC4899,#F472B6)"}}/>}</button>)}</div>
    <Det item={di} open={!!di} onClose={()=>sDi(null)} onEdit={()=>{sEi(di);sDi(null);sTab(2);}}/>
    <Toast msg={t.m} type={t.t} hide={()=>sT({m:"",t:""})}/>
    <Celeb show={c} onDone={()=>sC(false)}/>
  </div>);
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>

  <script>
    // Service Worker無効化
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(reg => reg.unregister());
      });
    }
  </script>
</body>
